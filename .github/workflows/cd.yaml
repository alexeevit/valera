name: CD
on:
  push:
    branches:
      - master
      - helm

concurrency:
  group: cd
  cancel-in-progress: true

jobs:
  build_and_push_image:
    name: Build and push docker image
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-cache

      - name: Build and push application image
        uses: docker/build-push-action@v6
        with:
          push: true
          target: production
          tags: ${{ secrets.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache

  helm_upgrade:
    name: Helm Upgrade
    needs: build_and_push_image
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: 3.13.3

      - name: Setup SOPS
        uses: nhedger/setup-sops@v2

      - name: Configure helm
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: |
          helm plugin install https://github.com/jkroepke/helm-secrets --version v4.6.2
          echo "$KUBECONFIG" > .kubeconfig
          chmod 600 .kubeconfig
          echo "$AGE_SECRET_KEY" > age-key.txt
          chmod 600 age-key.txt

      - name: Upgrade helm chart
        env:
          SOPS_AGE_KEY_FILE: ../age-key.txt
        run: |
          cd helm
          helm dependency update
          helm secrets upgrade valera . \
            --kubeconfig ../.kubeconfig \
            -f values.yaml -f secrets.yaml.enc \
            --set image.tag=${{ github.sha }} \
            -n valera \
            --install \
            --create-namespace
